<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <!-- Vendor JS -->
  <script src="/assets/js/jquery-3.7.1.min.js"></script>
  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/swiper-bundle.min.js"></script>

  <script src="/assets/js/matter.js"></script>

  <script src="/assets/js/main.js"></script>
  
  <!-- Custom Hero Script -->
  <script>
    window.addEventListener("load", () => {

      const heroSection = document.querySelector(".nirankar-hero");
      const heroTitle = document.getElementById("heroText");
      const nirankarSlides = document.querySelectorAll(
        ".nirankar-hero .hero-slide"
      );

      if (!heroSection || !heroTitle || !nirankarSlides.length) return;

      let nirankarIndex = 0;
      const nirankarDuration = 6000;

      function nirankarNextSlide() {
        nirankarSlides[nirankarIndex].classList.remove("active");

        nirankarIndex =
          (nirankarIndex + 1) % nirankarSlides.length;

        nirankarSlides[nirankarIndex].classList.add("active");
      }

      setInterval(nirankarNextSlide, nirankarDuration);

      window.addEventListener("scroll", () => {
        const heroRect =
          heroSection.getBoundingClientRect();

        const scrollProgress = Math.min(
          Math.max(
            (0 - heroRect.top) /
              heroSection.offsetHeight,
            0
          ),
          1
        );

        const baseSize = 56;
        const minSize = 28;

        const newSize =
          baseSize -
          (baseSize - minSize) * scrollProgress;

        heroTitle.style.fontSize = `${newSize}px`;
        heroTitle.style.opacity =
          1 - 0.4 * scrollProgress;
      });
    });
  </script>
</body>
</html>
